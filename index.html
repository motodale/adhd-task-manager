<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Task Wheel</title>
  <meta name="description" content="A premium customizable decision-making spin-wheel web app with native Web Audio ticking effects, custom weights, presets, themes, and full confetti celebrations.">
  <link rel="stylesheet" href="styles.css">
  <!-- Lucide Icons for clean visuals -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Dynamic Confetti Canvas Layer -->
  <canvas id="confettiCanvas"></canvas>

  <!-- Winner Modal -->
  <div class="modal-overlay" id="winnerModal">
    <div class="modal-content">
      <div class="modal-sparkles">🎉</div>
      <div class="modal-winner-label">We Have A Winner!</div>
      <div class="modal-winner-name" id="winnerName">Sample Win</div>
      <button class="modal-btn" id="closeModalBtn">Splendid!</button>
    </div>
  </div>

  <header>
    <div class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" class="brand-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
      </svg>
      <h1>The Task Wheel</h1>
    </div>
    <div class="header-controls">
      <button class="theme-btn" id="themeTogglerBtn">
        <i data-lucide="palette"></i>
        <span>Theme: Cyberpunk</span>
      </button>
    </div>
  </header>

  <main class="app-container">
    <!-- LEFT PANEL: Spin Wheel Canvas Area -->
    <section class="wheel-section">
      <div class="wheel-wrapper">
        <!-- Selector pointer positioned exactly at the top center -->
        <svg xmlns="http://www.w3.org/2000/svg" class="wheel-pointer" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M15.707 15.707a1 1 0 01-1.414 0l-5-5a1 1 0 010-1.414l5-5a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 010 1.414zm-6 0a1 1 0 01-1.414 0l-5-5a1 1 0 010-1.414l5-5a1 1 0 011.414 1.414L5.414 10l4.293 4.293a1 1 0 010 1.414z" transform="rotate(270 10 10)" />
        </svg>
        <canvas id="wheelCanvas"></canvas>
        <button class="wheel-center-btn" id="spinBtn">Spin</button>
      </div>
    </section>

    <!-- RIGHT PANEL: Settings and customization -->
    <section class="control-section">
      
      <!-- Segment List Configurator -->
      <div class="glass-card">
        <div class="items-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;">
          <h2 class="card-title" style="margin-bottom: 0;">
            <i data-lucide="list-plus"></i>
            Wheel Items
          </h2>
          <button class="clear-btn" id="clearItemsBtn" title="Clear All Items">
            <i data-lucide="trash-2"></i>
            Clear All
          </button>
        </div>
        <div class="segment-manager">
          <form class="add-segment-form" id="addSegmentForm">
            <input type="text" id="newItemLabel" class="input-glow" placeholder="Enter list item..." required maxlength="30" autocomplete="off">
            <input type="number" id="newItemWeight" class="input-glow" placeholder="Weight (Optional)" min="1" max="100" style="max-width: 140px;">
            <input type="number" id="newItemMultiplier" class="input-glow" placeholder="Multiplier (Optional)" min="1" max="500" style="max-width: 150px;">
            <button type="submit" class="btn-primary">
              <i data-lucide="plus"></i>
              Add
            </button>
          </form>
          <div class="segment-list" id="segmentListContainer">
            <!-- Dynamic elements loaded here -->
          </div>
        </div>
      </div>

      <!-- Presets Picker -->
      <div class="glass-card">
        <h2 class="card-title">
          <i data-lucide="sparkles"></i>
          Presets
        </h2>
        <div class="presets-grid">
          <button class="preset-btn" data-preset="decisions">
            <i data-lucide="help-circle"></i>
            Yes / No / Maybe
          </button>
          <button class="preset-btn" data-preset="numbers">
            <i data-lucide="hash"></i>
            Number Generator
          </button>
          <button class="preset-btn" data-preset="daily">
            <i data-lucide="calendar"></i>
            Daily Tasks
          </button>
        </div>
      </div>

      <!-- Settings / Parameters Panel -->
      <div class="glass-card">
        <h2 class="card-title">
          <i data-lucide="sliders"></i>
          Configurator
        </h2>
        <div class="slider-group">
          <div class="slider-item">
            <div class="slider-label">
              <span>Spin Duration</span>
              <span id="durationVal">5s</span>
            </div>
            <input type="range" id="spinDurationInput" min="2" max="10" step="1" value="5">
          </div>
          <div class="slider-item">
            <div class="slider-label">
              <span>Volume</span>
              <span id="volumeVal">70%</span>
            </div>
            <input type="range" id="volumeInput" min="0" max="100" step="5" value="70">
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 0.5rem; border-top: 1px solid var(--card-border);">
            <span style="font-size: 0.875rem; color: var(--text-muted); font-weight: 500;">Remove Winner on Land</span>
            <label class="switch">
              <input type="checkbox" id="removeWinnerToggle">
              <span class="slider-switch"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- History Panel -->
      <div class="glass-card">
        <div class="history-header">
          <h2 class="card-title">
            <i data-lucide="history"></i>
            Spin History
          </h2>
          <button class="clear-btn" id="clearHistoryBtn">
            <i data-lucide="trash-2"></i>
            Clear
          </button>
        </div>
        <div class="history-list" id="historyListContainer">
          <div class="history-empty">No spins logged yet. Hit Spin!</div>
        </div>
      </div>

    </section>
  </main>

  <footer>
    <p>Crafted with ai cause I suck at coding. Press Spin to begin. -<span id="daleEasterEgg" style="cursor: pointer; text-decoration: underline; font-weight: 700; color: var(--accent-primary); text-underline-offset: 3px;">Dale</span></p>
  </footer>

  <!-- Lucide Icons initialization -->
  <script>
    lucide.createIcons();
  </script>

  <!-- Classic Script Loading to allow direct file:// protocol execution without CORS blocks -->
  <script src="js/audio.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/state.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
